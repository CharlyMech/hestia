name: hestia
description: Shared household finance manager.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.5.0
  flutter: ^3.24.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # --- Supabase ---
  supabase_flutter: ^2.8.0

  # --- Auth ---
  sign_in_with_apple: ^6.1.3
  local_auth: ^2.3.0
  flutter_secure_storage: ^9.2.3
  crypto: ^3.0.6

  # --- State Management ---
  flutter_bloc: ^8.1.6
  equatable: ^2.0.7

  # --- Routing ---
  go_router: ^14.6.2

  # --- Preferences ---
  shared_preferences: ^2.3.0

  # --- Local DB ---
  drift: ^2.22.1
  sqlite3_flutter_libs: ^0.5.28
  path_provider: ^2.1.5
  path: ^1.9.0

  # --- UI ---
  skeletonizer: ^1.4.2
  forui: ^0.7.0
  cupertino_icons: ^1.0.8
  iconoir_flutter: ^7.11.0
  google_fonts: ^6.2.1

  # --- Charts ---
  fl_chart: ^0.70.2

  # --- Push Notifications ---
  firebase_core: ^3.8.1
  firebase_messaging: ^15.1.6

  # --- Splash ---
  flutter_native_splash: ^2.4.3

  # --- Utilities ---
  intl: ^0.20.2
  uuid: ^4.5.1
  connectivity_plus: ^6.1.1
  logger: ^2.5.0
  flutter_dotenv: ^5.2.1
  url_launcher: ^6.3.1
  rxdart: ^0.28.0

  # --- Google Calendar sync (prod flavor) ---
  googleapis: ^13.2.0
  googleapis_auth: ^1.6.0
  google_sign_in: ^6.2.2
  http: ^1.2.2
  extension_google_sign_in_as_googleapis_auth: ^2.0.12

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

  # --- Drift codegen ---
  drift_dev: ^2.22.1
  build_runner: ^2.4.13

  # --- Testing ---
  bloc_test: ^9.1.7
  mocktail: ^1.0.4
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: false
  generate: true

  assets:
    - assets/images/
    - assets/banks/
